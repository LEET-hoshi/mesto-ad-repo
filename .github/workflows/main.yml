name: Deploy Vite Site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: mesto-ad

      - name: Build
        run: npm run build
        working-directory: mesto-ad

      - name: Find and Prepare Build Folder
        run: |
          if [ -d "mesto-ad/dist" ]; then
            echo "Found dist in subfolder"
            cp -r mesto-ad/dist ./public_dist
          elif [ -d "mesto-ad/build" ]; then
            echo "Found build in subfolder"
            cp -r mesto-ad/build ./public_dist
          elif [ -d "dist" ]; then
            echo "Found dist in root"
            cp -r dist ./public_dist
          elif [ -d "build" ]; then
            echo "Found build in root"
            cp -r build ./public_dist
          else
            echo "No build folder found!"
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public_dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
